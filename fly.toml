# fly.toml app configuration file for ex-libris-latti
app = 'ex-libris-latti'
primary_region = 'ord'
kill_signal = 'SIGINT'
kill_timeout = '5s'
console_command = '/code/manage.py shell'

[experimental]
  auto_rollback = true

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  DJANGO_PRODUCTION = 'True'
  PORT = '8000'  # Fly will override this at runtime

[[mounts]]
  source = 'media_volume'
  destination = '/data/media'

[http_service]
  internal_port = 8000  # still OK, Fly maps $PORT automatically
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1  # keep at least 1 machine live
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '1s'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = "/data/media"
  url_prefix = "/media"

